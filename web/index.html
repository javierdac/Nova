<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#1f2937" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova — Plataforma de Inteligencia de Ingeniería</title>
    <script>
      // Apply persisted theme + language before React mounts to avoid a flash.
      try {
        var p = JSON.parse(localStorage.getItem('nova-prefs') || '{}').state || {};
        var theme = p.theme || 'dark';
        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.documentElement.style.colorScheme = theme;
        document.documentElement.lang = p.language || 'es';
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
